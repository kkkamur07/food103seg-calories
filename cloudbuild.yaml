steps:
  # 1. Download model weights from GCS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - -c
      - |
        mkdir -p saved/models/
        gsutil cp gs://${_GCP_BUCKET}/models/model.pth saved/models/model.pth
        ls -la saved/models/

  # 2. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/food-segmentation-app:${SHORT_SHA}',
        '.'
      ]

  # 3. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/food-segmentation-app:${SHORT_SHA}'
      ]

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - -c
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/food-segmentation-app:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --port 8080 \
          --memory 4Gi \
          --cpu 2 \
          --timeout 300 \
          --allow-unauthenticated

substitutions:
  _PROJECT_ID: 'your-gcp-project-id'
  _REGION: 'us-central1'
  _SERVICE_NAME: 'food-segmentation-service'
  _REPOSITORY: 'food-segmentation-repo'
  _GCP_BUCKET: 'food-segmentation-models'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/food-segmentation-app:${SHORT_SHA}'
